name: 축제 데이터 자동 수집

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 새벽 6시 KST (UTC 21:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests supabase

      - name: 축제 수집 실행
        env:
          TOUR_API_KEY:      ${{ secrets.TOUR_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          PINTEREST_TOKEN:   ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python festival_collector.py
